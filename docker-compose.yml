services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deepfakemedical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deepfakemedical"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/deepfakemedical
      SECRET_KEY: zameni-na-sluchainuyu-stroku-minimum-32-simvola
      FRONTEND_URL: http://localhost:5173
      MODEL_PATH: /app/models/best_model.pt
    volumes:
      - ./backend:/app/backend
      - ./model:/app/model
      - ./models:/app/models
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
